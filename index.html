<!DOCTYPE HTML>
<html>
<head>
    <meta charset='utf8'>
    <title>Gun Mayhem Ruffle</title>
</head>
<body>
    <div id='ruffle'></div>
    <!-- Load Ruffle from reliable CDN -->
    <script src='https://unpkg.com/@ruffle-rs/ruffle'></script>
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            var swfobject = {};
            swfobject.embedSWF = function(url, cont, width, height){
                var ruffle = window.RufflePlayer.newest(),
                    player = Object.assign(document.getElementById(cont).appendChild(ruffle.createPlayer()), {
                        width: width,
                        height: height,
                        style: 'width: ' + width + 'px; height: ' + height + 'px',
                    });
                player.load({ url: url });
            }

            // USE RAW URL HERE
            swfobject.embedSWF('https://github.com/barbecuechickenroast/gun-mayhem/raw/refs/heads/master/gun-mayhem-2.swf', 'ruffle', '100%', '100%');
        });
    </script>
</body>
</html>
